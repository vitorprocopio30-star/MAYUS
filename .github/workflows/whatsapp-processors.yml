name: WhatsApp processors

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: whatsapp-processors
  cancel-in-progress: false

jobs:
  process:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Process WhatsApp media
        run: |
          curl --fail --show-error --silent \
            --max-time 120 \
            --retry 2 \
            --retry-delay 5 \
            --header "Authorization: Bearer $CRON_SECRET" \
            "https://mayus-premium-pro.vercel.app/api/whatsapp/media/process?limit=10"
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}

      - name: Process WhatsApp replies
        run: |
          curl --fail --show-error --silent \
            --max-time 120 \
            --retry 2 \
            --retry-delay 5 \
            --header "Authorization: Bearer $CRON_SECRET" \
            "https://mayus-premium-pro.vercel.app/api/whatsapp/replies/process?limit=10"
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
